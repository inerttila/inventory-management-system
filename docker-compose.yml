services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-management-system
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "Inventory Management System"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: inventory
      DB_USERNAME: inventory
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - storage_data:/var/www/html/storage
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  storage_data:
  mysql_data:
